{% extends "base.html" %}

{% block title %}TEREX — Catalogo visual{% endblock %}

{% block content %}
<section class="hero-b">
    <div class="container-x">
        <p class="eyebrow">El catalogo</p>
        <h1 class="display hero-b-title">SHOP BY <span style="color:var(--accent);">PHONE.</span></h1>
        <p class="hero-b-sub">Elige tu marca para empezar, o busca tu modelo exacto.</p>

        <div class="search-wrap">
            <div class="search-shell">
                <i class="bi bi-search search-ico"></i>
                <input type="text" id="modeloInput" class="search-input"
                       placeholder="iPhone 15, Samsung S24, Moto G84..." autocomplete="off">
            </div>
            <div id="suggestions" class="suggestions"></div>
        </div>

        <div class="brand-grid">
            <button class="brand-tile" data-brand="IPHONE">
                <i class="bi bi-apple"></i>
                <span>iPhone</span>
            </button>
            <button class="brand-tile" data-brand="SAMSUNG">
                <i class="bi bi-phone"></i>
                <span>Samsung</span>
            </button>
            <button class="brand-tile" data-brand="MOTOROLA">
                <i class="bi bi-phone"></i>
                <span>Motorola</span>
            </button>
            <button class="brand-tile" data-brand="XIAOMI">
                <i class="bi bi-phone"></i>
                <span>Xiaomi</span>
            </button>
            <button class="brand-tile" data-brand="HUAWEI">
                <i class="bi bi-phone"></i>
                <span>Huawei</span>
            </button>
            <button class="brand-tile" data-brand="OPPO">
                <i class="bi bi-phone"></i>
                <span>Oppo</span>
            </button>
        </div>
    </div>
</section>

<section class="results">
    <div class="container-x">
        <div id="resultBar" class="result-bar" style="display:none;">
            <div>
                <p class="eyebrow">Resultados</p>
                <h2 class="display result-title" id="resultTitle"></h2>
            </div>
        </div>

        <div id="loading" class="loading" style="display:none;">
            <div class="spinner"></div>
        </div>

        <div id="emptyState" class="empty">
            <p class="empty-text">Selecciona una marca o busca tu modelo</p>
        </div>

        <div id="productGrid" class="grid-b"></div>
    </div>
</section>

<style>
    .hero-b { padding: 56px 0 32px; text-align: center; }
    .hero-b-title { margin-bottom: 14px; }
    .hero-b-sub { color: var(--muted); margin-bottom: 32px; }

    .search-wrap { position: relative; max-width: 640px; margin: 0 auto; }
    .search-shell {
        display: flex; align-items: center;
        background: var(--soft); border-radius: var(--radius);
        padding: 6px 6px 6px 22px;
    }
    .search-ico { color: var(--muted); }
    .search-input {
        flex: 1; border: none; background: transparent; outline: none;
        padding: 16px 12px; font-size: 1rem; font-family: inherit;
    }
    .suggestions {
        position: absolute; top: calc(100% + 6px); left: 0; right: 0;
        background: var(--paper); border: 1px solid var(--line);
        border-radius: 16px; box-shadow: 0 12px 32px rgba(0,0,0,.08);
        max-height: 360px; overflow-y: auto; z-index: 10;
        display: none; text-align: left;
    }
    .sug-item {
        display: block; width: 100%; text-align: left;
        background: none; border: none; padding: 14px 22px;
        font-size: .92rem; border-bottom: 1px solid var(--line);
    }
    .sug-item:last-child { border-bottom: none; }
    .sug-item:hover, .sug-item.active { background: var(--soft); }
    .sug-item small { color: var(--muted); margin-left: 8px; text-transform: uppercase; font-size: .68rem; letter-spacing: .1em; }

    .brand-grid {
        margin-top: 36px;
        display: grid; gap: 12px;
        grid-template-columns: repeat(6, 1fr);
    }
    @media (max-width: 800px) { .brand-grid { grid-template-columns: repeat(3, 1fr); } }
    .brand-tile {
        background: var(--soft); border: none; border-radius: 16px;
        padding: 20px 12px; display: flex; flex-direction: column;
        align-items: center; gap: 8px; transition: all .15s;
    }
    .brand-tile:hover { background: var(--ink); color: var(--paper); }
    .brand-tile i { font-size: 1.6rem; }
    .brand-tile span {
        font-size: .78rem; font-weight: 600; letter-spacing: .08em;
        text-transform: uppercase;
    }

    .results { padding: 48px 0; }
    .result-bar { margin-bottom: 28px; }
    .result-title { font-size: clamp(1.4rem, 3vw, 2rem); }

    .grid-b {
        display: grid; gap: 18px;
        grid-template-columns: repeat(5, 1fr);
    }
    @media (max-width: 1100px) { .grid-b { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 800px)  { .grid-b { grid-template-columns: repeat(3, 1fr); gap: 12px; } }
    @media (max-width: 480px)  { .grid-b { grid-template-columns: repeat(2, 1fr); } }

    .pcard { background: var(--paper); }
    .pcard .img {
        aspect-ratio: 1/1; background: var(--soft);
        border-radius: 14px; overflow: hidden; cursor: pointer;
        position: relative;
    }
    .pcard .img img { width: 100%; height: 100%; object-fit: cover; transition: transform .35s; }
    .pcard:hover .img img { transform: scale(1.04); }
    .pcard .img .ph {
        position: absolute; inset: 0; display: flex;
        align-items: center; justify-content: center; color: #ccc; font-size: 2rem;
    }
    .pcard .info { padding: 10px 4px 0; }
    .pcard h6 {
        margin: 0 0 2px; font-size: .82rem; font-weight: 600;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .pcard .meta {
        font-size: .7rem; color: var(--muted);
        text-transform: uppercase; letter-spacing: .06em;
    }
    .pcard .actions { margin-top: 8px; display: flex; gap: 4px; }
    .pcard .actions .pill { flex: 1; padding: 8px 10px; font-size: .65rem; }

    .loading { text-align: center; padding: 80px 0; }
    .spinner {
        display: inline-block; width: 32px; height: 32px;
        border: 3px solid var(--line); border-top-color: var(--ink);
        border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 80px 0; }
    .empty-text { font-size: 1.05rem; color: var(--muted); }

    /* ── Mobile polish ─────────────────────────────────────────────── */
    @media (max-width: 600px) {
        .hero-b { padding: 36px 0 18px; }
        .hero-b-title { margin-bottom: 10px; }
        .hero-b-sub { font-size: .95rem; margin-bottom: 22px; }
        .search-shell { padding: 4px 4px 4px 18px; }
        .search-input { padding: 14px 10px; font-size: .95rem; }
        .brand-grid { margin-top: 22px; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .brand-tile { padding: 16px 8px; }
        .brand-tile i { font-size: 1.4rem; }
        .brand-tile span { font-size: .68rem; }
        .results { padding: 26px 0 8px; }
        .pcard h6 { font-size: .8rem; }
        .pcard .meta { font-size: .68rem; }
        .pcard .actions .pill { padding: 7px 8px; font-size: .58rem; }
    }
    @media (max-width: 380px) {
        .brand-grid { grid-template-columns: repeat(2, 1fr); }
    }
</style>
{% endblock %}

{% block extra_scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const input = document.getElementById('modeloInput');
    const sugBox = document.getElementById('suggestions');
    const grid = document.getElementById('productGrid');
    const loading = document.getElementById('loading');
    const emptyState = document.getElementById('emptyState');
    const resultBar = document.getElementById('resultBar');
    const resultTitle = document.getElementById('resultTitle');

    const allModelos = {{ modelos | tojson }};
    let currentProducts = [];
    let currentModelo = '';

    document.querySelectorAll('.brand-tile').forEach(btn => {
        btn.addEventListener('click', function() {
            const brand = this.dataset.brand;
            const first = allModelos.find(m => (m.marca||'').toUpperCase() === brand);
            if (first) { input.value = first.modelo; loadProducts(first.modelo); }
            trackEvent('click', {action: 'brand_tile', brand});
        });
    });

    input.addEventListener('input', function() {
        const q = this.value.trim().toLowerCase();
        if (q.length < 1) { sugBox.style.display = 'none'; return; }
        const matches = allModelos.filter(m => m.modelo.toLowerCase().includes(q)).slice(0, 12);
        if (!matches.length) { sugBox.style.display = 'none'; return; }
        sugBox.innerHTML = matches.map(m =>
            `<button class="sug-item" data-modelo="${m.modelo}"><strong>${m.modelo}</strong><small>${m.marca || ''}</small></button>`
        ).join('');
        sugBox.style.display = 'block';
    });
    sugBox.addEventListener('click', e => {
        const btn = e.target.closest('[data-modelo]');
        if (btn) { input.value = btn.dataset.modelo; sugBox.style.display = 'none'; loadProducts(btn.dataset.modelo); }
    });
    document.addEventListener('click', e => {
        if (!sugBox.contains(e.target) && e.target !== input) sugBox.style.display = 'none';
    });
    input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && input.value.trim()) {
            e.preventDefault(); loadProducts(input.value.trim()); sugBox.style.display = 'none';
        }
    });

    async function loadProducts(modelo) {
        currentModelo = modelo;
        loading.style.display = 'block';
        emptyState.style.display = 'none';
        resultBar.style.display = 'none';
        grid.innerHTML = '';
        try {
            const r = await fetch(`/api/products?modelo=${encodeURIComponent(modelo)}`);
            const d = await r.json();
            currentProducts = d.products || [];
            render();
        } catch(e) { grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--accent);">Error</div>'; }
        loading.style.display = 'none';
    }

    function render() {
        if (!currentProducts.length) {
            resultBar.style.display = 'block';
            resultTitle.textContent = `Sin stock para ${currentModelo}`;
            grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;">
                <a class="pill wa lg" target="_blank"
                   href="https://wa.me/${WA_NUMBER}?text=${encodeURIComponent('Buscan funda para '+currentModelo)}"
                   onclick="trackEvent('whatsapp_click',{source:'no_stock'})"
                ><i class="bi bi-whatsapp"></i> Preguntanos</a>
            </div>`;
            return;
        }
        resultBar.style.display = 'block';
        resultTitle.textContent = `For ${currentModelo}`;

        grid.innerHTML = currentProducts.map((p, idx) => `
            <div class="pcard">
                <div class="img" ${p.image_url ? `onclick="showImage('${p.image_url}')"` : ''}>
                    ${p.image_url ? `<img src="${p.image_url}" loading="lazy">` : '<div class="ph"><i class="bi bi-phone"></i></div>'}
                </div>
                <div class="info">
                    <h6>${p.estilo}</h6>
                    <div class="meta">${p.color} · ${p.stock > 0 ? p.stock+' stock' : 'Agotado'}</div>
                    <div class="actions">
                        <button class="pill" data-idx="${idx}" data-action="add" ${p.stock === 0 ? 'disabled' : ''}>
                            <i class="bi bi-bag-plus"></i>
                        </button>
                        <button class="pill wa" data-idx="${idx}" data-action="wa">
                            <i class="bi bi-whatsapp"></i>
                        </button>
                    </div>
                </div>
            </div>
        `).join('');

        grid.querySelectorAll('[data-action="add"]').forEach(b => b.addEventListener('click', function() {
            const p = currentProducts[+this.dataset.idx];
            addToCart({estilo: p.estilo, color: p.color, modelo: currentModelo, image_url: p.image_url});
        }));
        grid.querySelectorAll('[data-action="wa"]').forEach(b => b.addEventListener('click', function() {
            const p = currentProducts[+this.dataset.idx];
            trackEvent('whatsapp_click', {source: 'product', estilo: p.estilo, color: p.color, modelo: currentModelo});
            window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(`Hola, me interesa ${p.estilo} ${p.color} para ${currentModelo}`)}`, '_blank');
        }));
    }

    const pre = new URLSearchParams(window.location.search).get('modelo');
    if (pre) { input.value = pre; loadProducts(pre); }
});
</script>
{% endblock %}
